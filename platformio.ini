[platformio]
; tof_test is intentionally excluded until src/tof_test/ is added, so the
; default build and CI only compile environments that have source.
default_envs = can_test, motor_test

; Shared settings inherited by all environments
[common_env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = adafruit_feather_esp32s3_nopsram
framework = arduino
monitor_speed = 115200

[env:can_test]
extends = common_env
build_src_filter = -<*> +<can_test/*>

[env:motor_test]
extends = common_env
build_src_filter = -<*> +<motor_test/*>

; Retained for the ToF sensor test; add src/tof_test/ then re-add this env to
; default_envs above.
[env:tof_test]
extends = common_env
build_src_filter = -<*> +<tof_test/*>
lib_deps = stm32duino/STM32duino VL53L4CX@^1.1.0
build_flags = -DARDUINO_ARCH_ESP32
